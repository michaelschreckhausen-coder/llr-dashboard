<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leadesk</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, system-ui, 'Segoe UI', sans-serif;
      background: #F8FAFC;
      color: #0F172A;
      font-size: 13px;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, rgb(49,90,231) 0%, rgb(85,125,245) 100%);
      padding: 16px 18px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-logo {
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .header-text h1 { font-size: 16px; font-weight: 800; color: #fff; }
    .header-text p  { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 1px; }

    /* Status */
    .status-bar {
      padding: 10px 18px;
      background: #fff;
      border-bottom: 1px solid #E5E7EB;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #D1D5DB;
      flex-shrink: 0;
    }
    .status-dot.connected { background: #22c55e; }
    .status-dot.error     { background: #ef4444; }
    .status-text { color: #475569; flex: 1; }

    /* Content */
    .content { padding: 14px 18px; }

    /* Profile Card */
    .profile-card {
      background: #fff;
      border: 1px solid #E5E7EB;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      display: none;
    }
    .profile-card.visible { display: block; }
    .profile-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .profile-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgb(49,90,231), rgb(99,155,255));
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 16px;
      flex-shrink: 0; overflow: hidden;
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-name { font-weight: 700; font-size: 14px; color: #0F172A; }
    .profile-title { font-size: 11px; color: #64748B; margin-top: 2px; }
    .profile-company { font-size: 11px; color: #64748B; }

    /* Import Button */
    .btn-import {
      width: 100%;
      padding: 10px;
      background: rgb(49,90,231);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.15s;
    }
    .btn-import:hover:not(:disabled) { background: rgb(35,68,180); }
    .btn-import:disabled { background: #94A3B8; cursor: default; }
    .btn-import.success { background: #059669; }
    .btn-import.error   { background: #DC2626; }

    /* Info */
    .info-box {
      background: #EFF6FF;
      border: 1px solid #BFDBFE;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 12px;
      color: #1d4ed8;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .info-box.warning {
      background: #FFFBEB;
      border-color: #FDE68A;
      color: #92400E;
    }
    .info-box.success {
      background: #ECFDF5;
      border-color: #A7F3D0;
      color: #065F46;
    }

    /* Footer */
    .footer {
      padding: 10px 18px 14px;
      display: flex;
      gap: 8px;
    }
    .btn-sm {
      flex: 1;
      padding: 7px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .btn-outline {
      background: #fff;
      border: 1px solid #E2E8F0;
      color: #475569;
    }
    .btn-outline:hover { background: #F8FAFC; border-color: #CBD5E1; }
    .btn-primary {
      background: rgb(49,90,231);
      border: none;
      color: #fff;
    }
    .btn-primary:hover { background: rgb(35,68,180); }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* Not on profile */
    .not-profile {
      padding: 20px 18px;
      text-align: center;
      color: #94A3B8;
    }
    .not-profile svg { margin-bottom: 8px; opacity: 0.5; }
    .not-profile p { font-size: 12px; line-height: 1.6; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 0 2h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1 0-2h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z"/>
        <circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Leadesk</h1>
      <p>LinkedIn Lead Import</p>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Prüfe Status...</span>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Not logged in -->
    <div id="notLoggedIn" style="display:none">
      <div class="info-box warning">
        <strong>Nicht eingeloggt</strong><br>
        Bitte melde dich zuerst in Leadesk an, damit du Leads importieren kannst.
      </div>
      <button class="btn-import" onclick="openDashboard()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Zu Leadesk öffnen
      </button>
    </div>

    <!-- Not on profile page -->
    <div id="notOnProfile" style="display:none">
      <div class="not-profile">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <p>Öffne ein <strong>LinkedIn-Profil</strong>, um es direkt in Leadesk zu importieren.</p>
      </div>
    </div>

    <!-- Profile found -->
    <div id="profileFound" style="display:none">
      <div class="profile-card visible" id="profileCard">
        <div class="profile-card-header">
          <div class="profile-avatar" id="profileAvatar">?</div>
          <div>
            <div class="profile-name" id="profileName">—</div>
            <div class="profile-title" id="profileTitle"></div>
            <div class="profile-company" id="profileCompany"></div>
          </div>
        </div>
      </div>

      <button class="btn-import" id="importBtn" onclick="importLead()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polyline points="16 16 12 12 8 16"/>
          <line x1="12" y1="12" x2="12" y2="21"/>
          <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
        </svg>
        In Leadesk importieren
      </button>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn-sm btn-outline" onclick="openDashboard()">Dashboard öffnen</button>
    <button class="btn-sm btn-outline" onclick="openLeads()">Alle Leads</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
