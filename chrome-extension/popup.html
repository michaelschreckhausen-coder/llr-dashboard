<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<title>Lead Radar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{width:320px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff}
.top{background:linear-gradient(135deg,rgb(49,90,231),rgb(100,140,240));padding:16px 18px;display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,0.22);display:flex;align-items:center;justify-content:center}
.logo svg{width:17px;height:17px;fill:white}
.brand{font-size:15px;font-weight:800;color:white;letter-spacing:-0.02em}
.sub{font-size:10px;color:rgba(255,255,255,0.65);text-transform:uppercase;letter-spacing:0.08em;margin-top:1px}
.body{padding:20px 18px}
/* LOGIN */
#login-view label{display:block;font-size:11px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;margin-top:14px}
#login-view label:first-of-type{margin-top:0}
#login-view input{width:100%;padding:10px 13px;border:1.5px solid #E5E7EB;border-radius:10px;font-size:13px;outline:none;color:#111;transition:border-color 0.15s}
#login-view input:focus{border-color:rgb(49,90,231)}
#login-btn{width:100%;margin-top:16px;padding:11px;border-radius:11px;border:none;background:linear-gradient(135deg,rgb(49,90,231),rgb(100,140,240));color:white;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(49,90,231,0.35);transition:all 0.15s}
#login-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(49,90,231,0.45)}
#login-btn:disabled{opacity:0.6;transform:none;cursor:default}
#err{display:none;margin-top:12px;padding:9px 12px;background:#FEF2F2;border:1px solid #FCA5A5;border-radius:9px;font-size:12px;color:#991B1B;font-weight:600}
/* CONNECTED */
#connected-view{display:none}
.profile-card{display:flex;align-items:center;gap:13px;background:rgb(238,241,252);border-radius:14px;padding:14px 15px;margin-bottom:16px}
.avatar{width:48px;height:48px;border-radius:50%;border:2px solid rgb(49,90,231);object-fit:cover;flex-shrink:0;background:#E5E7EB}
.avatar-placeholder{width:48px;height:48px;border-radius:50%;border:2px solid rgb(49,90,231);background:linear-gradient(135deg,rgb(49,90,231),rgb(100,140,240));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:white;flex-shrink:0}
.profile-info .name{font-size:14px;font-weight:800;color:rgb(20,20,43)}
.profile-info .headline{font-size:11px;color:#6B7280;margin-top:2px;max-width:190px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dot-wrap{display:flex;align-items:center;gap:6px;margin-top:6px}
.dot{width:8px;height:8px;border-radius:50%;background:#10B981;flex-shrink:0;box-shadow:0 0 0 2px rgba(16,185,129,0.25)}
.dot-label{font-size:11px;font-weight:700;color:#10B981}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{padding:9px 10px;border-radius:9px;border:1.5px solid #E5E7EB;background:white;font-size:12px;font-weight:700;color:#374151;cursor:pointer;transition:all 0.12s;text-align:center}
.btn:hover{border-color:rgb(49,90,231);color:rgb(49,90,231)}
.btn.danger:hover{border-color:#FCA5A5;color:#DC2626}
.btn-full{width:100%;margin-top:8px;padding:10px;border-radius:10px;border:none;background:linear-gradient(135deg,rgb(49,90,231),rgb(100,140,240));color:white;font-size:13px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="top">
  <div class="logo"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
  <div><div class="brand">Lead Radar</div><div class="sub">LinkedIn Cloud</div></div>
</div>
<div class="body">
  <!-- LOGIN -->
  <div id="login-view">
    <label>E-Mail</label>
    <input type="email" id="email" placeholder="deine@email.de" autocomplete="email"/>
    <label>Passwort</label>
    <input type="password" id="password" placeholder="Passwort" autocomplete="current-password"/>
    <button id="login-btn">Anmelden</button>
    <div id="err"></div>
  </div>
  <!-- VERBUNDEN -->
  <div id="connected-view">
    <div class="profile-card">
      <div id="avatar-wrap"></div>
      <div class="profile-info">
        <div class="name" id="li-name">LinkedIn verbinden...</div>
        <div class="headline" id="li-headline"></div>
        <div class="dot-wrap"><div class="dot"></div><div class="dot-label" id="conn-status">Verbunden</div></div>
      </div>
    </div>
    <div class="grid">
      <button class="btn" id="sync-btn">Sync starten</button>
      <button class="btn" id="dash-btn">Dashboard</button>
      <button class="btn" id="li-btn">LinkedIn oeffnen</button>
      <button class="btn danger" id="logout-btn">Abmelden</button>
    </div>
    <button class="btn-full" id="scrape-btn">Profil jetzt importieren</button>
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
