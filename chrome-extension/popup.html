<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Lead Radar</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{width:300px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:rgb(238,241,252);color:rgb(20,20,43)}
    .header{background:linear-gradient(135deg,rgb(49,90,231),rgb(100,140,240));padding:14px 16px;display:flex;align-items:center;gap:10px}
    .logo{width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center}
    .logo svg{width:16px;height:16px;fill:white}
    .brand{color:white;font-weight:800;font-size:14px}
    .brand-sub{color:rgba(255,255,255,0.7);font-size:10px;letter-spacing:0.05em;text-transform:uppercase}
    .body{padding:16px}
    .section{display:none}
    .section.active{display:block}
    label{display:block;font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;margin-top:12px}
    label:first-child{margin-top:0}
    input[type=email],input[type=password]{width:100%;padding:9px 12px;border:1.5px solid #E5E7EB;border-radius:10px;font-size:13px;outline:none;background:white;color:rgb(20,20,43)}
    input:focus{border-color:rgb(49,90,231)}
    .btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;margin-top:10px;transition:all 0.15s}
    .btn-primary{background:linear-gradient(135deg,rgb(49,90,231),rgb(100,140,240));color:white;box-shadow:0 4px 12px rgba(49,90,231,0.3)}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(49,90,231,0.4)}
    .btn-primary:disabled{opacity:0.6;transform:none}
    .btn-secondary{background:white;color:#374151;border:1px solid #E5E7EB}
    .btn-ghost{background:none;color:#9CA3AF;border:none;font-size:11px;padding:6px;margin-top:6px;width:auto}
    .status{display:none;padding:8px 12px;border-radius:8px;font-size:12px;font-weight:600;margin-top:10px}
    .status.error{background:#FEF2F2;color:#991B1B;border:1px solid #FCA5A5}
    .status.success{background:#F0FDF4;color:#065F46;border:1px solid #A7F3D0}
    .info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.05);font-size:12px}
    .info-row:last-child{border-bottom:none}
    .info-label{color:#9CA3AF;font-weight:500}
    .info-value{color:rgb(20,20,43);font-weight:600;max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .info-box{background:white;border-radius:12px;padding:10px 14px;margin-bottom:12px;border:1px solid #E5E7EB}
    .divider{height:1px;background:#E5E7EB;margin:12px 0}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .btn-sm{padding:8px 10px;font-size:12px;border-radius:8px;cursor:pointer;border:1px solid #E5E7EB;background:white;color:#374151;font-weight:600;transition:all 0.15s;text-align:center}
    .btn-sm:hover{border-color:rgb(49,90,231);color:rgb(49,90,231)}
    .btn-sm:disabled{opacity:0.4;cursor:not-allowed}
  </style>
</head>
<body>

<div class="header">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
  </div>
  <div>
    <div class="brand">Lead Radar</div>
    <div class="brand-sub">LinkedIn Cloud</div>
  </div>
</div>

<div class="body">
  <div id="status" class="status"></div>

  <!-- LOGIN VIEW -->
  <div id="login-view" class="section active">
    <label for="email">E-Mail</label>
    <input type="email" id="email" placeholder="deine@email.de" autocomplete="email"/>
    <label for="password">Passwort</label>
    <input type="password" id="password" placeholder="Passwort" autocomplete="current-password"/>
    <button class="btn btn-primary" id="login-btn">Anmelden</button>
  </div>

  <!-- MAIN VIEW -->
  <div id="main-view" class="section">
    <div class="info-box">
      <div class="info-row">
        <span class="info-label">Account</span>
        <span class="info-value" id="user-email">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">LinkedIn</span>
        <span class="info-value" id="li-status">Nicht verbunden</span>
      </div>
      <div class="info-row">
        <span class="info-label">Aktuelle Seite</span>
        <span class="info-value" id="current-url">-</span>
      </div>
    </div>

    <button class="btn btn-primary" id="connect-li-btn">
      LinkedIn verbinden
    </button>

    <div class="divider"></div>

    <div class="grid-2">
      <button class="btn-sm" id="scrape-btn">Profil importieren</button>
      <button class="btn-sm" id="sync-btn">Sync starten</button>
      <button class="btn-sm" id="dashboard-btn">Dashboard oeffnen</button>
      <button class="btn-sm" id="logout-btn" style="color:#DC2626;border-color:#FCA5A5">Abmelden</button>
    </div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
