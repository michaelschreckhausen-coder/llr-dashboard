<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leadesk</title>
  <style>
    /* ── Design-Tokens (in sync mit src/lib/leadStyleTokens.js) ──
       --wl-primary  : Whitelabel-Hook (vom Tenant überschreibbar)
       Default       : Navy aus Web-App-Chrome (Sidebar-Logo / Welcome-Hero)
    */
    :root {
      --wl-primary: rgb(0, 48, 96);
      --wl-primary-hover: rgb(0, 36, 72);
      --wl-primary-soft: #E7EEF6;
      --wl-primary-soft-fg: #042C53;

      --surface: #ffffff;
      --surface-muted: #f7f6f3;
      --surface-canvas: #faf9f6;

      --border-subtle: rgba(0, 0, 0, 0.06);
      --border-hover: rgba(0, 0, 0, 0.12);

      --text-primary: #1a1a1a;
      --text-secondary: #555550;
      --text-tertiary: #8a8a85;

      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-pill: 999px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--surface-canvas);
      color: var(--text-primary);
      font-size: 13px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .header-logo {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .header-logo img {
      width: 100%; height: 100%; object-fit: contain; display: block;
    }
    .header-text h1 {
      font-size: 14px; font-weight: 600; color: var(--text-primary);
      letter-spacing: -0.01em;
    }
    .header-text p {
      font-size: 11px; color: var(--text-tertiary); margin-top: 1px;
    }

    /* ── Status-Bar ── */
    .status-bar {
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #B4B2A9;
      flex-shrink: 0;
    }
    .status-dot.connected { background: #639922; }
    .status-dot.error     { background: #BA1A1A; }
    .status-text { color: var(--text-secondary); flex: 1; }

    /* ── Content ── */
    .content { padding: 14px 16px 4px; }

    /* ── Profile-Card ── */
    .profile-card {
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 14px;
      margin-bottom: 12px;
      display: none;
    }
    .profile-card.visible { display: block; }
    .profile-card-header {
      display: flex;
      align-items: center;
      gap: 11px;
    }
    .profile-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: #EEEDFE;
      color: #26215C;
      display: flex; align-items: center; justify-content: center;
      font-weight: 500; font-size: 16px;
      flex-shrink: 0; overflow: hidden;
      letter-spacing: -0.02em;
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-name {
      font-weight: 500; font-size: 14px; color: var(--text-primary);
      line-height: 1.3;
    }
    .profile-title {
      font-size: 12px; color: var(--text-secondary); margin-top: 2px;
      line-height: 1.4;
    }
    .profile-company {
      font-size: 12px; color: var(--text-tertiary); line-height: 1.4;
    }

    /* ── Team-Selector ── */
    .team-selector { margin-bottom: 12px; }
    .team-selector label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-tertiary);
      margin-bottom: 6px;
    }
    .team-selector select {
      width: 100%;
      padding: 9px 30px 9px 11px;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      font-size: 13px; font-family: inherit;
      color: var(--text-primary);
      background: var(--surface) url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 24 24' fill='none' stroke='%238a8a85' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E") no-repeat right 11px center;
      outline: none; cursor: pointer; appearance: none;
      transition: border-color 0.12s;
    }
    .team-selector select:hover { border-color: var(--border-hover); }
    .team-selector select:focus {
      border-color: var(--wl-primary);
      box-shadow: 0 0 0 3px rgba(0, 48, 96, 0.08);
    }

    /* ── Primary Button (Import) ── */
    .btn-import {
      width: 100%;
      padding: 11px;
      background: var(--wl-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.12s;
    }
    .btn-import:hover:not(:disabled) { background: var(--wl-primary-hover); }
    .btn-import:disabled { background: #B4B2A9; cursor: default; }
    .btn-import.success { background: #639922; }
    .btn-import.error   { background: #BA1A1A; }

    /* ── Info-Box ── */
    .info-box {
      background: var(--wl-primary-soft);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 11px 13px;
      font-size: 12px;
      color: var(--wl-primary-soft-fg);
      line-height: 1.55;
      margin-bottom: 12px;
    }
    .info-box.warning {
      background: #FAEEDA;
      color: #633806;
    }
    .info-box.success {
      background: #EAF3DE;
      color: #3B6D11;
    }
    .info-box strong { font-weight: 600; }

    /* ── No-Profile-State ── */
    .not-profile {
      padding: 28px 18px 24px;
      text-align: center;
      color: var(--text-tertiary);
    }
    .not-profile-icon {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--surface-muted);
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 12px;
      color: var(--text-tertiary);
    }
    .not-profile p { font-size: 12px; line-height: 1.6; color: var(--text-secondary); }
    .not-profile strong { color: var(--text-primary); font-weight: 500; }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* ── SSI-Section ── */
    .ssi-section {
      margin-top: 10px;
      padding-top: 14px;
      border-top: 1px solid var(--border-subtle);
    }
    .ssi-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }
    .ssi-score-card {
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 11px 13px;
      margin-bottom: 8px;
      display: none;
    }
    .ssi-score-card.visible { display: flex; }
    .ssi-score-card {
      align-items: center;
      justify-content: space-between;
    }
    .ssi-score-num {
      font-size: 22px;
      font-weight: 600;
      color: var(--wl-primary);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .ssi-score-sub {
      font-size: 10px;
      color: var(--text-tertiary);
      margin-top: 3px;
    }
    .ssi-score-meta {
      text-align: right;
      font-size: 10px;
      color: var(--text-tertiary);
      line-height: 1.5;
    }
    .ssi-btn {
      width: 100%;
      padding: 10px;
      background: var(--surface);
      color: var(--wl-primary);
      border: 1px solid var(--wl-primary);
      border-radius: var(--radius-md);
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: all 0.12s;
    }
    .ssi-btn:hover:not(:disabled) { background: var(--wl-primary-soft); }
    .ssi-btn:disabled { opacity: 0.5; cursor: default; }
    .ssi-hint {
      font-size: 10px;
      color: var(--text-tertiary);
      text-align: center;
      margin-top: 6px;
    }

    /* ── Footer ── */
    .footer {
      padding: 12px 16px 14px;
      display: flex;
      gap: 8px;
      border-top: 1px solid var(--border-subtle);
      margin-top: 8px;
      background: var(--surface);
    }
    .btn-sm {
      flex: 1;
      padding: 8px;
      border-radius: var(--radius-md);
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      text-align: center;
      transition: all 0.12s;
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
    }
    .btn-sm:hover { background: var(--surface-muted); color: var(--text-primary); border-color: var(--border-hover); }
    .btn-outline { /* alias — kompatibel mit popup.js falls noch genutzt */ }
    .btn-primary {
      background: var(--wl-primary);
      border: 1px solid var(--wl-primary);
      color: #fff;
    }
    .btn-primary:hover { background: var(--wl-primary-hover); color: #fff; border-color: var(--wl-primary-hover); }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <img src="icons/icon128.png" alt="Leadesk Logo">
    </div>
    <div class="header-text">
      <h1>Leadesk</h1>
      <p>LinkedIn Lead Import</p>
    </div>
  </div>

  <!-- Status-Bar -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Prüfe Status…</span>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Nicht eingeloggt -->
    <div id="notLoggedIn" style="display:none">
      <div class="info-box warning">
        <strong>Nicht eingeloggt</strong><br>
        Bitte melde dich zuerst in Leadesk an, um Leads zu importieren.
      </div>
      <button class="btn-import">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Zu Leadesk öffnen
      </button>
    </div>

    <!-- Kein Profil aktiv -->
    <div id="notOnProfile" style="display:none">
      <div class="not-profile">
        <div class="not-profile-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <p>Öffne ein <strong>LinkedIn-Profil</strong>, um es direkt in Leadesk zu importieren.</p>
      </div>
    </div>

    <!-- Profil gefunden -->
    <div id="profileFound" style="display:none">
      <div class="profile-card visible" id="profileCard">
        <div class="profile-card-header">
          <div class="profile-avatar" id="profileAvatar">?</div>
          <div style="flex:1; min-width:0">
            <div class="profile-name" id="profileName">—</div>
            <div class="profile-title" id="profileTitle"></div>
            <div class="profile-company" id="profileCompany"></div>
          </div>
        </div>
      </div>

      <div class="team-selector" id="teamSelector" style="display:none">
        <label>📁 Team auswählen</label>
        <select id="teamSelect"></select>
      </div>

      <button class="btn-import" id="importBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 16 12 12 8 16"/>
          <line x1="12" y1="12" x2="12" y2="21"/>
          <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
        </svg>
        In Leadesk importieren
      </button>
    </div>

    <!-- SSI Section -->
    <div id="ssiSection" class="ssi-section" style="display:none">
      <div class="ssi-label">📊 LinkedIn SSI Score</div>

      <div id="ssiLastScore" class="ssi-score-card">
        <div>
          <div class="ssi-score-num" id="ssiScoreVal">—</div>
          <div class="ssi-score-sub">von 100 Punkten</div>
        </div>
        <div class="ssi-score-meta">
          <div id="ssiScoreDate">—</div>
          <div id="ssiSubScores" style="margin-top:2px"></div>
        </div>
      </div>

      <button id="ssiBtn" class="ssi-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        SSI Score jetzt laden
      </button>
      <div class="ssi-hint">Öffnet kurz LinkedIn im Hintergrund</div>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn-sm">Dashboard öffnen</button>
    <button class="btn-sm">Alle Leads</button>
  </div>

  <script>
    // ssiLastScore braucht .visible-Toggle damit display:flex aktiv wird.
    // popup.js setzt heute style.display direkt — kompatibilität: wenn JS
    // display='block' oder ''='' setzt, klassen-driven oder JS-driven beide ok.
    // Hier kein Code-Change nötig, weil popup.js style.display='block' setzt,
    // und unser CSS .ssi-score-card.visible { display:flex } nur als default-on
    // gilt. Falls JS später ergänzt: ssiLastScore.classList.add('visible')
    // statt style.display='block' verwenden.
  </script>
  <script src="popup.js"></script>
</body>
</html>
