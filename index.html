<!DOCTYPE html>
<html lang="de">
<head>
  <!-- Theme-Early-Detection (Phase Theme-1).
       Muss VOR dem Body rendern, damit kein Light/Dark-Flash entsteht.
       Priorität: localStorage-Cache → System-Preference → Light-Fallback. -->
  <script>
    (function() {
      try {
        var cached = localStorage.getItem('leadesk.theme');
        var theme;
        if (cached === 'light' || cached === 'dark') {
          theme = cached;
        } else {
          theme = 'light';   // Light ist Produkt-Default, kein System-Auto
        }
        document.documentElement.setAttribute('data-theme', theme);
      } catch(e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <!-- wl-early -->
  <script>
    // Frühes WhiteLabel-Laden verhindert Style-Flash
    (async function() {
      try {
        const host = window.location.hostname;
        let sub = 'app';
        if (host.endsWith('.leadesk.de')) sub = host.replace('.leadesk.de', '');
        else if (host !== 'localhost' && !host.includes('127.0.0') && !host.includes('vercel.app')) sub = host;
        const key = 'wl_cache_' + sub;
        const cached = sessionStorage.getItem(key);
        if (cached) {
          const wl = JSON.parse(cached);
          const r = document.documentElement;
          if (wl.primary_color)   r.style.setProperty('--wl-primary', wl.primary_color);
          if (wl.secondary_color) r.style.setProperty('--wl-secondary', wl.secondary_color);
          // sidebar_bg nur setzen wenn vom Theme-Default ('#FFFFFF') abweichend
          if (wl.sidebar_bg && wl.sidebar_bg !== '#FFFFFF' && wl.sidebar_bg !== '#ffffff') {
            r.style.setProperty('--wl-sidebar-bg', wl.sidebar_bg);
          }
        }
      } catch(e) {}
    })();
  </script>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leadesk</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="icon" type="image/png" sizes="512x512" href="/Leadesk_Favicon.png"/>
  <link rel="apple-touch-icon" href="/Leadesk_Favicon.png"/>

  <!-- Schrift: Inter, DSGVO-/ISO-konform SELF-HOSTED (kein Google-Fonts-Call).
       @font-face-Deklarationen in src/index.css. Caveat (Schreibschrift) ausgemustert. -->
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
