<!DOCTYPE html>
<html lang="de">
<head>
  <!-- Theme-Early-Detection (Phase Theme-1).
       Muss VOR dem Body rendern, damit kein Light/Dark-Flash entsteht.
       Priorität: localStorage-Cache → System-Preference → Light-Fallback. -->
  <script>
    (function() {
      try {
        var cached = localStorage.getItem('leadesk.theme');
        var theme;
        if (cached === 'light' || cached === 'dark') {
          theme = cached;
        } else {
          theme = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
      } catch(e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <!-- wl-early -->
  <script>
    // Frühes WhiteLabel-Laden verhindert Style-Flash
    (async function() {
      try {
        const host = window.location.hostname;
        let sub = 'app';
        if (host.endsWith('.leadesk.de')) sub = host.replace('.leadesk.de', '');
        else if (host !== 'localhost' && !host.includes('127.0.0') && !host.includes('vercel.app')) sub = host;
        const key = 'wl_cache_' + sub;
        const cached = sessionStorage.getItem(key);
        if (cached) {
          const wl = JSON.parse(cached);
          const r = document.documentElement;
          if (wl.primary_color)   r.style.setProperty('--wl-primary', wl.primary_color);
          if (wl.secondary_color) r.style.setProperty('--wl-secondary', wl.secondary_color);
          if (wl.sidebar_bg)      r.style.setProperty('--wl-sidebar-bg', wl.sidebar_bg);
        }
      } catch(e) {}
    })();
  </script>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leadesk</title>
  <link rel="icon" type="image/png" href="/Leadesk_Favicon (1).png"/>

  <!-- Caveat: handschriftlicher Akzent-Font (Timeline-Zeitmarker, "Note-to-self"-Text).
       TODO DSGVO: perspektivisch self-hosten, da Google Fonts IPs an Google überträgt. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&display=swap" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
